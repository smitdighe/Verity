services:
  - type: web
    name: verity-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: openai/gpt-oss-20b
      - key: MODEL_PATH
        value: ml_artifacts/model.joblib
      - key: EXPLAINER_PATH
        value: ml_artifacts/explainer.joblib
      - key: VECTORIZER_PATH
        value: ml_artifacts/tfidf_vectorizer.joblib
      - key: METADATA_PATH
        value: ml_artifacts/model_metadata.json
      - key: TOP_SHAP_FEATURES
        value: 10